<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MUTAVERSE — How It Works</title>
<style>
  :root{
    --void:#04060C;
    --navy:#0B1322;
    --cyan:#2ee6c8;
    --cyan-hi:#7af0c0;
    --ice:#CDE8F5;
    --ice-dim:#7F9CB5;
    --display:"Space Grotesk","Segoe UI",system-ui,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:var(--display);
    color:var(--ice);
    background:
      radial-gradient(1200px 700px at 70% -10%, rgba(46,230,200,.10), transparent 62%),
      radial-gradient(900px 600px at 5% 120%, rgba(18,168,148,.10), transparent 60%),
      var(--void);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:clamp(2rem,6vw,5rem) clamp(1.25rem,4vw,3.5rem);
    overflow-x:hidden;
  }

  h1{
    font-weight:700;
    font-size:clamp(2.6rem,7vw,4.4rem);
    letter-spacing:.05em;
    margin:0;
    color:var(--cyan);
    text-shadow:0 0 26px rgba(46,230,200,.55),0 0 62px rgba(46,230,200,.22);
    text-transform:uppercase;
  }
  .sub{
    margin:.55rem 0 clamp(2.6rem,6vw,4rem);
    font-size:clamp(1.05rem,2vw,1.4rem);
    font-weight:500;
    color:var(--ice-dim);
    letter-spacing:.01em;
  }

  .flow{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:0;
    flex-wrap:nowrap;
    max-width:100%;
    padding-bottom:.5rem;
  }
  .flow::-webkit-scrollbar{height:6px;}
  .flow::-webkit-scrollbar-thumb{background:rgba(46,230,200,.4);border-radius:20px;}

  .pill{
    flex:0 0 auto;
    position:relative;
    overflow:hidden;
    padding:.7rem clamp(.7rem,1.3vw,1.25rem);
    border-radius:999px;
    background:linear-gradient(160deg, rgba(13,26,48,.85), rgba(11,19,34,.65));
    border:1.5px solid rgba(46,230,200,.55);
    color:var(--ice);
    font-weight:700;
    font-size:clamp(.82rem,1.15vw,1.1rem);
    white-space:nowrap;
    box-shadow:0 0 22px -8px var(--cyan), 0 0 0 1px rgba(4,6,12,.5) inset;
    opacity:0;
    transform:translateY(14px);
    /* rise once on load, then breathe forever */
    animation:
      rise .55s cubic-bezier(.2,.7,.2,1) forwards,
      breathe 3.4s ease-in-out infinite;
  }
  @keyframes rise{to{opacity:1;transform:translateY(0);}}
  @keyframes breathe{
    0%,100%{
      border-color:rgba(46,230,200,.45);
      box-shadow:0 0 18px -9px var(--cyan), 0 0 0 1px rgba(4,6,12,.5) inset;
    }
    50%{
      border-color:rgba(122,240,192,.9);
      box-shadow:0 0 30px -5px var(--cyan), 0 0 0 1px rgba(4,6,12,.5) inset;
    }
  }
  /* light sweep that runs across each pill in sequence */
  .pill::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(105deg, transparent 35%, rgba(122,240,192,.35) 50%, transparent 65%);
    transform:translateX(-120%);
    animation:sweep 4.9s ease-in-out infinite;
    pointer-events:none;
  }
  @keyframes sweep{
    0%,60%{transform:translateX(-120%);}
    78%{transform:translateX(120%);}
    100%{transform:translateX(120%);}
  }

  .link{
    flex:1 1 auto;
    min-width:16px;
    height:2px;
    position:relative;
    background:linear-gradient(90deg, rgba(46,230,200,.15), rgba(46,230,200,.55), rgba(46,230,200,.15));
    opacity:0;
    animation:fade .55s ease forwards;
  }
  @keyframes fade{to{opacity:1;}}
  /* the pulse: a glowing dot that travels along each connector, pill to pill */
  .link .node{
    position:absolute;
    top:50%;left:0;
    width:9px;height:9px;
    margin-top:-4.5px;
    border-radius:50%;
    background:var(--cyan-hi);
    box-shadow:0 0 12px 3px var(--cyan-hi);
    animation:pulse-run 4.9s cubic-bezier(.55,0,.45,1) infinite;
  }
  @keyframes pulse-run{
    0%{left:0;opacity:0;transform:scale(.5);}
    8%{opacity:1;transform:scale(1);}
    50%{left:100%;opacity:1;transform:scale(1);}
    58%{opacity:0;transform:scale(.5);}
    100%{left:0;opacity:0;transform:scale(.5);}
  }
  /* a trail of light that fills the connector as the pulse passes */
  .link .trail{
    position:absolute;
    top:0;left:0;height:100%;width:100%;
    background:linear-gradient(90deg, var(--cyan-hi), rgba(46,230,200,0));
    transform-origin:left center;
    transform:scaleX(0);
    animation:trail-run 4.9s cubic-bezier(.55,0,.45,1) infinite;
  }
  @keyframes trail-run{
    0%{transform:scaleX(0);opacity:.9;}
    50%{transform:scaleX(1);opacity:.9;}
    62%{transform:scaleX(1);opacity:0;}
    100%{transform:scaleX(0);opacity:0;}
  }

  @media (max-width:820px){
    body{justify-content:flex-start;}
    .flow{flex-direction:column;align-items:stretch;}
    .pill{text-align:center;}
    .link{width:2px;height:26px;align-self:center;
      background:linear-gradient(180deg, rgba(46,230,200,.15), rgba(46,230,200,.55), rgba(46,230,200,.15));}
    .link .node{left:50%;top:0;margin:0 0 0 -4.5px;animation:pulse-run-v 4.9s cubic-bezier(.55,0,.45,1) infinite;}
    .link .trail{width:100%;height:100%;
      background:linear-gradient(180deg, var(--cyan-hi), rgba(46,230,200,0));
      transform-origin:center top;}
  }
  @keyframes pulse-run-v{
    0%{top:0;opacity:0;transform:scale(.5);}
    8%{opacity:1;transform:scale(1);}
    50%{top:100%;opacity:1;transform:scale(1);}
    58%{opacity:0;transform:scale(.5);}
    100%{top:0;opacity:0;transform:scale(.5);}
  }

  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;}
    .pill{opacity:1;transform:none;}
    .link{opacity:1;}
    .link .node{left:50%;margin-left:-4.5px;opacity:1;}
    .link .trail,.pill::after{display:none;}
  }
</style>
</head>
<body>
  <h1>How It Works</h1>
  <p class="sub">Upload once, explore many futures</p>
  <div class="flow" id="flow"></div>

<script>
  const steps = ["Upload","Analyze","Generate 4 Worlds","Select","Mutate","Compare","Export"];
  const flow = document.getElementById("flow");

  // one full wave takes the length of the loop (4.9s); each step gets an even slice
  // so the pulse & sweep travel Upload -> Export in sequence, then repeat.
  const CYCLE = 4.9;
  const wave = CYCLE / steps.length;   // delay between consecutive steps

  steps.forEach((label, i) => {
    const pill = document.createElement("div");
    pill.className = "pill";
    pill.textContent = label;
    // rise-in is quick & staggered; the looping sweep is phased along the wave
    pill.style.animationDelay = `${0.15 + i * 0.18}s, ${i * wave}s`;
    flow.appendChild(pill);

    if (i < steps.length - 1){
      const link = document.createElement("div");
      link.className = "link";
      link.style.animationDelay = `${0.24 + i * 0.18}s`;
      const phase = `${(i + 0.5) * wave}s`;   // pulse fires just after its left pill lights
      link.innerHTML =
        `<span class="trail" style="animation-delay:${phase}"></span>` +
        `<span class="node" style="animation-delay:${phase}"></span>`;
      flow.appendChild(link);
    }
  });
</script>
</body>
</html>
